---
- name: Create directory from variables
  hosts: all
  connection: local
  gather_facts: false

  tasks:
    - name: Create base directory
      ansible.builtin.file:
        path: "{{ base_dir }}"
        state: directory
        mode: "{{ dir_mode | default('0755') }}"

    - name: Create subdirectories
      ansible.builtin.file:
        path: "{{ base_dir }}/{{ item.name }}"
        state: directory
        mode: "{{ item.mode | default('0755') }}"
      loop: "{{ subdirs }}"

    - name: Print summary
      ansible.builtin.debug:
        msg: "Created {{ subdirs | length }} subdirs under {{ base_dir }} on {{ inventory_hostname }}"
