---
- name: Create directory from variables
  hosts: all
  connection: {{ host }}
  gather_facts: false
  
  vars:
    base_dir: {{ base_dir }}
  
  tasks:
    - name: Create base directory
      ansible.builtin.file:
        path: "{{ base_dir }}"
        state: directory
        mode: "{{ dir_mode | default('0755') }}"

    - name: Create subdirectories
      ansible.builtin.file:
        path: "{{ base_dir }}/{{ item.name }}"
        state: directory
        mode: "{{ item.mode | default('0755') }}"
      loop: "{{ sub_dirs }}"

    - name: Print summary
      ansible.builtin.debug:
        msg: "Created {{ sub_dirs | length }} sub directories under {{ base_dir }} on {{ host }}"
