---
- name: Create scheduler user
  hosts: all
  become: true

  vars:
    scheduler_user: "scheduler"
    scheduler_group: "scheduler"
    scheduler_home: "/home/scheduler"
    scheduler_shell: "/bin/bash"

  tasks:
    - name: Create group
      ansible.builtin.group:
        name: "{{ scheduler_group }}"
        state: present

    - name: Create user
      ansible.builtin.user:
        name: "{{ scheduler_user }}"
        group: "{{ scheduler_group }}"
        home: "{{ scheduler_home }}"
        shell: "{{ scheduler_shell }}"
        create_home: true
        state: present

    - name: Confirm user created
      ansible.builtin.debug:
        msg: "User {{ scheduler_user }} created on {{ inventory_hostname }}"
